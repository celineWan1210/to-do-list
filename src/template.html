<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>
</head>
<body>
    <div class="content">
        <div class="sidebar">
            <div class="project-title">
                Project List
            </div>

            <div class="projects">
                <ul class="project-list">
                    <li>
                        <span class="material-symbols-outlined">
                            task
                        </span>
                        <p class="project-title">Default Project</p>
                    </li>
                </ul>
            </div>
        </div>

        <div class="main-content">
            <div class="project-header">
                <div class="project-title">
                    Default Project
                </div>

                <div class="desc">
                    This is a default project. 
                    Try out now!
                </div>
            </div>

            <div class="to-do-item">
                <div class="item-basic-info">
                    <div class="left-side">
                        <p class="item-title">
                            Study
                        </p>
                        <div class="item-priority">
                            Important
                        </div>
                    </div>

                    <div class="item-date">
                        24/8/25
                    </div>
                </div>

                <div class="details">
                    <details>
                        <summary>CheckList</summary>
                        <input type="checkbox" id="check-list-1" name="check-list-1">
                        <label for="check-list-1">FIT1045</label>
                    </details>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="side-bar-end">
            <span class="material-symbols-outlined">add</span>
            <p>Add Project</p>
        </div>

        <div class="main-content-footer">
            <div class="add-to-do">
                <span class="material-symbols-outlined">
                    add
                </span>
            </div>
            <div class="edit-to-do">
                <span class="material-symbols-outlined">
                    edit
                </span>
            </div>
            <div class="delete-todo">
                <span class="material-symbols-outlined">
                    delete
                </span>
            </div>
        </div>
    </div>
</body>
</html>
